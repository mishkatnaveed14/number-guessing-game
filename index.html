<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number-Guessing-Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./responsive.css">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" /> -->
</head>

<body>
    <!-- nav bar start -->
    <nav class="navbar navbar-expand-lg" style="background-color: var(--Light-Background);">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-1" href="#">
                <img src="./images/number-guess.png" alt="Logo" width="48" height="48">
                <span class="fw-bold">Number Guess</span>
            </a>


            <div class="navbar-links">

                <a class="nav-link nav-active" href="#">
                    <i class="bi bi-house-door"></i>
                    <span>Home</span>
                </a>

                <a class="nav-link custom-nav" href="#">
                    <i class="bi bi-trophy"></i>
                    <span>Leaderboard</span>
                </a>

                <a class="nav-link custom-nav" href="#">
                    <i class="bi bi-bar-chart"></i>
                    <span>Statistics</span>
                </a>

                <a class="nav-link custom-nav" href="#">
                    <i class="bi bi-info-circle"></i>
                    <span>About</span>
                </a>


            </div>
            <!-- mode button  -->
            <button id="theme_btn">
                <span class="circle"></span>
            </button>
            <!-- ---end---- -->
        </div>
    </nav>
    <!-- nav bar end -->
    <!-- container number guess -->
    <div class="con-1 hero-card">
        <a class="navbar-brand d-flex align-items-center justify-content-center gap-1" href="#">
            <img src="./images/number-guess.png" alt="Logo" width="55" height="55">
            <span class=" fs-1 fw-bold">Number Guess</span>
        </a>
        <p class="fs-4 my-2 fw-semibold" style="color: var(--Primary);" id="">
            Test your guessing skills! Find the hidden number before time runs out
        </p>
    </div>
    <!-- end -->

    <!-- game card -->
    <section class="container my-5">
        <div class="game-card">

            <i class="bi bi-controller game-icon"></i>

            <h1 class="hero-title">
                Ready to Play?
            </h1>

            <p class="hero-subtitle">
                Select your difficulty level:
            </p>

            <div class="difficulty-buttons">

                <button class="difficulty-btn easy">
                    <span>Easy</span>
                    <small>1-50</small>
                </button>

                <button class="difficulty-btn medium">
                    <span>Medium</span>
                    <small>1-100</small>
                </button>

                <button class="difficulty-btn hard">
                    <span>Hard</span>
                    <small>1-500</small>
                </button>

            </div>

            <div class="difficulty-info">
                <p>Easy: 7 lives, 60s timer</p>
                <p>Medium: 5 lives, 45s timer</p>
                <p>Hard: 3 lives, 30s timer</p>
            </div>

        </div>
    </section>
    <!-- game card end!! -->
    <script src="./bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
